name: Supabase Guardrails & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # 1. GUARDRAIL: Ensure your code matches the DB
  verify-types:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run if Supabase secrets are configured
    if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase Configuration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          # Validate token format (must start with sbp_ and have at least 32 characters total)
          if [[ ! "$SUPABASE_ACCESS_TOKEN" =~ ^sbp_[a-zA-Z0-9]{32,}$ ]]; then
            echo "❌ ERROR: Invalid SUPABASE_ACCESS_TOKEN format."
            echo "👉 The token must start with 'sbp_' followed by at least 32 alphanumeric characters"
            echo "👉 Example format: sbp_0102...1920"
            echo "👉 Please update the secret in repository settings: Settings → Secrets and variables → Actions"
            exit 1
          fi
          
          # Validate project ID is not empty
          if [[ -z "$PROJECT_ID" ]]; then
            echo "❌ ERROR: SUPABASE_PROJECT_ID is not set."
            echo "👉 Please set the secret in repository settings: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Generate Types (Drift Check)
        env:
          # REQUIRED for CLI commands
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          # Generate types to a temp file
          supabase gen types typescript --project-id $PROJECT_ID --schema public > src/types/database.types.ts
          
          # Check if the generated file matches your committed file
          if [[ -n $(git status --porcelain src/types/database.types.ts) ]]; then
            echo "❌ ERROR: Database types are out of sync with the DB."
            echo "👉 ACTION: Run 'npm run typegen' locally and commit the result."
            exit 1
          else
            echo "✅ Types are in sync."
          fi

  # 2. DEPLOY: Only runs if types are verified
  deploy-functions:
    runs-on: ubuntu-latest
    needs: verify-types
    # Only deploy on push to main, not on PRs (optional safety)
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          # Only run if functions dir exists
          if [ -d supabase/functions ]; then
            # Get list of function directories
            functions=$(ls supabase/functions)
            
            for func in $functions; do
              echo "Deploying $func..."
              # REMOVED --no-verify-jwt (Secure by default)
              supabase functions deploy "$func" --project-ref $PROJECT_ID
            done
          else
             echo "No functions to deploy."
          fi
