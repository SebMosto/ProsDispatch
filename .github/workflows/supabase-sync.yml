name: Supabase Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-types:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_PROJECT_ID: nctjhybvdmyxanqiphi
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - name: Generate Supabase types
        run: |
          supabase gen types typescript --project-id $SUPABASE_PROJECT_ID --schema public > src/supabaseTypes.ts

  deploy-functions:
    runs-on: ubuntu-latest
    needs: generate-types
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_PROJECT_ID: nctjhybvdmyxanqiphi
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - name: Deploy Edge Functions
        run: |
          if [ -d supabase/functions ]; then
            for dir in supabase/functions/*/ ; do
              fname=$(basename "$dir")
              supabase functions deploy "$fname" --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt
            done
          else
            echo "No functions to deploy."
          fi
