name: AI Agent Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  detect-ai-pr:
    name: Detect AI-Generated PR
    runs-on: ubuntu-latest
    outputs:
      is_ai_generated: ${{ steps.check.outputs.is_ai }}
    steps:
      - name: Check if PR is AI-generated
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = (pr.title || '').toLowerCase();
            const body = (pr.body || '').toLowerCase();
            const author = pr.user.login.toLowerCase();
            const branch = pr.head.ref.toLowerCase();
            
            // Check for AI indicators
            const aiIndicators = [
              'codex', 'gemini', 'copilot', 'bot',
              'automated', 'ai-generated', 'gpt'
            ];
            
            const isAI = aiIndicators.some(indicator => 
              title.includes(indicator) || 
              body.includes(indicator) ||
              author.includes(indicator) ||
              branch.includes(indicator)
            );
            
            if (isAI) {
              console.log('🤖 AI-generated PR detected');
              core.setOutput('is_ai', 'true');
            } else {
              console.log('👤 Human-generated PR');
              core.setOutput('is_ai', 'false');
            }
            
            return isAI;

  ai-code-audit:
    name: AI Code Pattern Audit
    runs-on: ubuntu-latest
    needs: detect-ai-pr
    if: needs.detect-ai-pr.outputs.is_ai_generated == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Audit AI-generated code patterns
        run: |
          echo "🤖 Running enhanced audit for AI-generated code..."
          echo ""
          
          # Ensure the base ref is available for comparison
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
          
          # Get list of changed files
          git diff --name-only FETCH_HEAD...HEAD > changed_files.txt
          
          echo "Changed files:"
          cat changed_files.txt
          echo ""
          
          VIOLATIONS=0
          
          # Check for forbidden patterns more strictly
          echo "Checking for forbidden patterns..."
          
          # Check for Next.js patterns
          if grep -r "from ['\"]next" --include="*.ts" --include="*.tsx" $(cat changed_files.txt) 2>/dev/null; then
            echo "❌ Next.js imports detected"
            VIOLATIONS=$((VIOLATIONS + 1))
          fi
          
          # Check for proposal/bidding/escrow patterns (forbidden features)
          FORBIDDEN_TERMS=("proposal" "bidding" "bid" "escrow" "marketplace")
          for term in "${FORBIDDEN_TERMS[@]}"; do
            if grep -i -r "$term" --include="*.ts" --include="*.tsx" $(cat changed_files.txt) 2>/dev/null | grep -v "// " | grep -v "/* " ; then
              echo "⚠️ Potential forbidden feature detected: '$term'"
              echo "   Verify this is not implementing marketplace/bidding/escrow functionality"
              # Don't fail on these - they might be legitimate (e.g., in comments/docs)
            fi
          done
          
          # Check for hardcoded strings that should be i18n
          echo ""
          echo "Checking for untranslated strings..."
          for file in $(cat changed_files.txt | grep -E "\.(tsx|jsx)$"); do
            if [ -f "$file" ]; then
              # Look for string literals in JSX that aren't translation keys
              HARDCODED=$(grep -E ">['\"][A-Z][a-z]+.*['\"]<" "$file" 2>/dev/null || true)
              if [ ! -z "$HARDCODED" ]; then
                echo "⚠️ Potential hardcoded text in $file"
                echo "   Verify all user-facing strings use i18n"
              fi
            fi
          done
          
          # Check for 'any' type usage (should be avoided)
          echo ""
          echo "Checking for TypeScript 'any' usage..."
          for file in $(cat changed_files.txt | grep -E "\.(ts|tsx)$"); do
            if [ -f "$file" ]; then
              ANY_COUNT=$(grep -c ": any" "$file" 2>/dev/null || echo "0")
              if [ "$ANY_COUNT" -gt 0 ]; then
                echo "⚠️ Found $ANY_COUNT 'any' type usage in $file"
                echo "   Consider using more specific types"
              fi
            fi
          done
          
          # Check for TODO/FIXME comments added by AI
          echo ""
          echo "Checking for TODO/FIXME comments..."
          for file in $(cat changed_files.txt); do
            if [ -f "$file" ]; then
              TODOS=$(grep -i "TODO\|FIXME" "$file" 2>/dev/null || true)
              if [ ! -z "$TODOS" ]; then
                echo "⚠️ TODO/FIXME found in $file:"
                echo "$TODOS"
              fi
            fi
          done
          
          echo ""
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "❌ $VIOLATIONS critical violations found"
            echo "AI-generated code must be corrected before merge"
            exit 1
          else
            echo "✅ No critical violations detected"
          fi
      
      - name: Comment on PR with audit results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            const comment = `## 🤖 AI Agent Audit Report
            
            This PR has been identified as AI-generated and received enhanced scrutiny per the Multi-Agent Protocol.
            
            ### Verification Checklist
            
            Per governance, AI-generated code must:
            - [ ] Follow all architectural constraints (no Next.js, no forbidden features)
            - [ ] Implement only the requested feature (no scope creep)
            - [ ] Use established patterns and components
            - [ ] Include proper TypeScript types (avoid \`any\`)
            - [ ] Externalize all user-facing strings for i18n
            - [ ] Include tests for new functionality
            - [ ] Have no hardcoded secrets or configuration
            
            **Human reviewers**: Please verify the AI followed the spec and governance rules before approving.
            
            ---
            *Per MultiAgentProtocol.md: "CI treats AI-generated PRs no differently – it gets the full battery of tests and audits."*
            `;
            
            // Check if audit comment already exists
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            
            const hasAuditComment = comments.data.some(c => 
              c.body.includes('AI Agent Audit Report') && c.user.type === 'Bot'
            );
            
            if (!hasAuditComment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: comment
              });
            }
