name: CI Guardrails

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-and-static-analysis:
    name: Linting & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Debug - Show package.json
        run: cat package.json
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Run ESLint
        run: npm run lint
      
      - name: TypeScript type check
        run: npx tsc --noEmit

  build-and-type-check:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build application (treat warnings as errors)
        run: npm run build
        env:
          CI: true

  security-scanning:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Run npm audit (fail on critical vulnerabilities)
        run: npm audit --audit-level=critical
      
      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  localization-check:
    name: Localization Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Check for untranslated strings
        run: |
          echo "Checking for hardcoded strings in source files..."
          
          # Check for potential untranslated strings (text in JSX without t() wrapper)
          # This is a basic check - look for strings in quotes that aren't in comments
          UNTRANSLATED=$(grep -r --include="*.tsx" --include="*.jsx" --include="*.ts" -E ">[^<]*[a-zA-Z]{3,}[^<]*<" src/ || true)
          
          # Check if locale files exist and are not empty
          if [ ! -f "src/i18n/locales/en.json" ] || [ ! -f "src/i18n/locales/fr.json" ]; then
            echo "ERROR: Missing locale files (en.json or fr.json)"
            exit 1
          fi
          
          EN_KEYS=$(cat src/i18n/locales/en.json | grep -o '"[^"]*":' | wc -l)
          FR_KEYS=$(cat src/i18n/locales/fr.json | grep -o '"[^"]*":' | wc -l)
          
          echo "English translation keys: $EN_KEYS"
          echo "French translation keys: $FR_KEYS"
          
          if [ "$EN_KEYS" -eq 0 ] || [ "$FR_KEYS" -eq 0 ]; then
            echo "ERROR: One or both locale files are empty"
            exit 1
          fi
          
          # Allow some difference but warn if significant mismatch
          DIFF=$((EN_KEYS - FR_KEYS))
          DIFF=${DIFF#-}  # absolute value
          
          if [ "$DIFF" -gt 5 ]; then
            echo "WARNING: Significant mismatch between EN ($EN_KEYS) and FR ($FR_KEYS) translation keys"
            echo "This may indicate missing translations"
          fi
          
          echo "✓ Localization check passed"

  accessibility-audit:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      
      - name: Build application
        run: npm run build
      
      - name: Install axe-core
        run: npm install -D @axe-core/cli --legacy-peer-deps
      
      - name: Start preview server and run accessibility tests
        run: |
          npm run preview &
          SERVER_PID=$!
          echo "Waiting for server to start..."
          sleep 5
          
          # Test the main page for accessibility violations
          npx axe http://localhost:4173 --exit || {
            echo "ERROR: Critical accessibility violations detected (WCAG 2.1 AA)"
            kill $SERVER_PID
            exit 1
          }
          
          kill $SERVER_PID
          echo "✓ Accessibility audit passed"

  responsive-layout-tests:
    name: Responsive Layout Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      
      - name: Build application
        run: npm run build
      
      - name: Run viewport tests
        run: |
          npm run preview &
          SERVER_PID=$!
          echo "Waiting for server to start..."
          sleep 5
          
          # Create a simple Playwright script to test responsive layouts
          cat > responsive-test.mjs << 'EOF'
          import { chromium } from 'playwright';
          
          const viewports = [
            { name: 'Mobile', width: 375, height: 667 },
            { name: 'Tablet', width: 768, height: 1024 },
            { name: 'Desktop', width: 1920, height: 1080 }
          ];
          
          (async () => {
            const browser = await chromium.launch();
            let hasErrors = false;
            
            for (const viewport of viewports) {
              console.log(`Testing ${viewport.name} viewport (${viewport.width}x${viewport.height})`);
              const context = await browser.newContext({ viewport });
              const page = await context.newPage();
              
              try {
                await page.goto('http://localhost:4173', { timeout: 10000 });
                
                // Check for horizontal scroll (layout breakage)
                const hasHorizontalScroll = await page.evaluate(() => {
                  return document.documentElement.scrollWidth > document.documentElement.clientWidth;
                });
                
                if (hasHorizontalScroll) {
                  console.error(`❌ Horizontal scroll detected on ${viewport.name} viewport - layout breakage!`);
                  hasErrors = true;
                } else {
                  console.log(`✓ ${viewport.name} viewport passed`);
                }
                
              } catch (error) {
                console.error(`❌ Error testing ${viewport.name}:`, error.message);
                hasErrors = true;
              } finally {
                await context.close();
              }
            }
            
            await browser.close();
            
            if (hasErrors) {
              process.exit(1);
            }
          })();
          EOF
          
          npx playwright install chromium
          node responsive-test.mjs || {
            kill $SERVER_PID
            exit 1
          }
          
          kill $SERVER_PID
          echo "✓ Responsive layout tests passed"

  test-suite:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Run tests (if test script exists)
        run: |
          if grep -q '"test":' package.json; then
            npm test
          else
            echo "⚠️ No test script found in package.json"
            echo "Tests are required for production-ready code"
            echo "This is currently a warning but should be addressed"
          fi

  code-coverage:
    name: Code Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Check coverage configuration
        run: |
          echo "⚠️ Code coverage threshold enforcement not yet implemented"
          echo "Required: 80% coverage threshold"
          echo "TODO: Add test framework with coverage (e.g., Vitest with c8)"
          echo "This is currently a warning but must be implemented before release"

  governance-audit:
    name: Governance Policy Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for forbidden patterns
        run: |
          echo "Scanning for governance violations..."
          
          # Check for Next.js imports (forbidden)
          if grep -r "from ['\"]next" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" src/ 2>/dev/null; then
            echo "❌ ERROR: Next.js imports detected (forbidden per governance)"
            exit 1
          fi
          
          # Check for hardcoded API keys or secrets patterns
          if grep -r -E "(SUPABASE_URL|SUPABASE_ANON_KEY|STRIPE_SECRET_KEY|API_KEY)\s*=\s*['\"][a-zA-Z0-9]" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" src/ 2>/dev/null; then
            echo "❌ ERROR: Hardcoded API keys or secrets detected"
            exit 1
          fi
          
          # Check for inline styles (should use Tailwind classes)
          INLINE_STYLES=$(grep -r 'style={{' --include="*.tsx" --include="*.jsx" src/ 2>/dev/null | wc -l)
          if [ "$INLINE_STYLES" -gt 0 ]; then
            echo "⚠️ WARNING: $INLINE_STYLES inline styles found. Consider using Tailwind classes instead."
          fi
          
          # Check for console.log in production code (should use proper logging)
          CONSOLE_LOGS=$(grep -r 'console\.log' --include="*.ts" --include="*.tsx" src/ 2>/dev/null | grep -v "//.*console\.log" | wc -l)
          if [ "$CONSOLE_LOGS" -gt 0 ]; then
            echo "⚠️ WARNING: $CONSOLE_LOGS console.log statements found. Consider using proper logging."
          fi
          
          echo "✓ Governance audit completed"

  all-checks-complete:
    name: All CI Guardrails Passed
    runs-on: ubuntu-latest
    needs: 
      - lint-and-static-analysis
      - build-and-type-check
      - security-scanning
      - localization-check
      - accessibility-audit
      - responsive-layout-tests
      - test-suite
      - code-coverage
      - governance-audit
    steps:
      - name: All checks passed
        run: |
          echo "✅ All CI Guardrails checks have passed!"
          echo "Code is ready for review and merge."
